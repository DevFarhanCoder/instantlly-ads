<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designer Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        /* ===== THEME VARIABLES ===== */
        :root {
            --bg-body: #111111;
            --bg-body-gradient: linear-gradient(135deg, #111111 0%, #1a1a1a 50%, #222222 100%);
            --bg-card: rgba(30, 30, 30, 0.85);
            --bg-input: rgba(20, 20, 20, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-footer: #475569;
            --border-card: rgba(148, 163, 184, 0.1);
            --border-input: rgba(148, 163, 184, 0.15);
            --placeholder-color: #475569;
            --card-shadow: rgba(0, 0, 0, 0.3);
            --error-text: #fca5a5;
            --toggle-bg: rgba(148, 163, 184, 0.1);
            --toggle-bg-hover: rgba(148, 163, 184, 0.18);
        }

        [data-theme="light"] {
            --bg-body: #f5f5f5;
            --bg-body-gradient: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 50%, #dcdcdc 100%);
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-input: rgba(245, 245, 245, 0.8);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --text-footer: #94a3b8;
            --border-card: rgba(0, 0, 0, 0.08);
            --border-input: rgba(0, 0, 0, 0.1);
            --placeholder-color: #9ca3af;
            --card-shadow: rgba(0, 0, 0, 0.08);
            --error-text: #ef4444;
            --toggle-bg: rgba(100, 116, 139, 0.08);
            --toggle-bg-hover: rgba(100, 116, 139, 0.14);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-body-gradient);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--border-card);
            background: var(--toggle-bg);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        .theme-toggle:hover {
            background: var(--toggle-bg-hover);
            color: var(--text-primary);
        }
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px var(--card-shadow);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 48px;
        }
        .logo-section h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .logo-section p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i.input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
            z-index: 1;
        }
        .form-group input {
            width: 100%;
            padding: 12px 42px 12px 42px;
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .form-group input::placeholder {
            color: var(--placeholder-color);
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .password-toggle:hover {
            color: var(--text-primary);
        }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error-text);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: flex; align-items: center; gap: 8px; }
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-footer);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-palette"></i>
                </div>
                <h1>Designer Portal</h1>
                <p>Sign in to access your design requests</p>
            </div>

            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" style="padding-right: 46px;">
                        <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="footer-text">
                Instantlly Designer Portal &copy; 2025
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // THEME
        // ============================================================
        function getPreferredTheme() {
            const saved = localStorage.getItem('designerTheme');
            if (saved) return saved;
            return 'light';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.className = theme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            localStorage.setItem('designerTheme', theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        // Apply theme immediately
        applyTheme(getPreferredTheme());

        // Password visibility toggle
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // Check if already logged in
        const token = localStorage.getItem('designerToken');
        if (token) {
            verifyAndRedirect();
        }

        async function verifyAndRedirect() {
            try {
                const res = await fetch(`${CONFIG.getApiBaseUrl()}/api/designer/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    window.location.href = 'index.html';
                } else {
                    localStorage.removeItem('designerToken');
                    localStorage.removeItem('designerUser');
                }
            } catch (e) {
                // Token invalid, stay on login
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorText.textContent = 'Please enter both username and password';
                errorDiv.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            errorDiv.classList.remove('show');

            try {
                const res = await fetch(`${CONFIG.getApiBaseUrl()}/api/designer/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem('designerToken', data.token);
                    localStorage.setItem('designerUser', JSON.stringify(data.designer));
                    window.location.href = 'index.html';
                } else {
                    errorText.textContent = data.message || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorText.textContent = 'Unable to connect to server. Please try again.';
                errorDiv.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }
    </script>
</body>
</html>
