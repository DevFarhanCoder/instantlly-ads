<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designer Portal - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* ===== THEME VARIABLES ===== */
        :root {
            --bg-body: #111111;
            --bg-header: rgba(28, 28, 28, 0.95);
            --bg-card: rgba(30, 30, 30, 0.85);
            --bg-card-hover-shadow: rgba(0, 0, 0, 0.4);
            --bg-input: rgba(20, 20, 20, 0.7);
            --bg-tabs: rgba(28, 28, 28, 0.6);
            --bg-stat-card: rgba(30, 30, 30, 0.7);
            --bg-modal: #1c1c1c;
            --bg-dropzone: rgba(20, 20, 20, 0.5);
            --bg-badge: rgba(99, 102, 241, 0.12);
            --bg-btn-secondary: rgba(148, 163, 184, 0.1);
            --bg-btn-secondary-hover: rgba(148, 163, 184, 0.18);
            --bg-filter-btn: rgba(30, 30, 30, 0.6);
            --bg-filter-active: rgba(99, 102, 241, 0.2);
            --bg-preview: rgba(0, 0, 0, 0.92);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-detail: #e2e8f0;
            --text-card-body: #cbd5e1;
            --border-color: rgba(148, 163, 184, 0.1);
            --border-light: rgba(148, 163, 184, 0.08);
            --border-card: rgba(148, 163, 184, 0.1);
            --border-input: rgba(148, 163, 184, 0.12);
            --border-filter: rgba(148, 163, 184, 0.15);
            --empty-icon-color: #334155;
            --empty-title-color: #64748b;
            --empty-subtitle-color: #475569;
            --placeholder-color: #475569;
            --video-thumb-bg: #1f2937;
        }

        [data-theme="light"] {
            --bg-body: #f5f5f5;
            --bg-header: rgba(255, 255, 255, 0.95);
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-hover-shadow: rgba(0, 0, 0, 0.08);
            --bg-input: rgba(245, 245, 245, 0.8);
            --bg-tabs: rgba(255, 255, 255, 0.7);
            --bg-stat-card: rgba(255, 255, 255, 0.9);
            --bg-modal: #ffffff;
            --bg-dropzone: rgba(245, 245, 245, 0.6);
            --bg-badge: rgba(99, 102, 241, 0.08);
            --bg-btn-secondary: rgba(100, 116, 139, 0.08);
            --bg-btn-secondary-hover: rgba(100, 116, 139, 0.14);
            --bg-filter-btn: rgba(255, 255, 255, 0.8);
            --bg-filter-active: rgba(99, 102, 241, 0.12);
            --bg-preview: rgba(0, 0, 0, 0.85);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --text-detail: #334155;
            --text-card-body: #475569;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-light: rgba(0, 0, 0, 0.05);
            --border-card: rgba(0, 0, 0, 0.1);
            --border-input: rgba(0, 0, 0, 0.1);
            --border-filter: rgba(0, 0, 0, 0.12);
            --empty-icon-color: #cbd5e1;
            --empty-title-color: #94a3b8;
            --empty-subtitle-color: #94a3b8;
            --placeholder-color: #9ca3af;
            --video-thumb-bg: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-btn-secondary);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background: var(--bg-btn-secondary-hover);
            color: var(--text-primary);
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-header);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s, border-color 0.3s;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-logo {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .header-title {
            font-size: 18px;
            font-weight: 700;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-badge);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #6366f1;
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* ===== TABS ===== */
        .tabs-container {
            display: flex;
            gap: 4px;
            padding: 16px 24px 0;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tabs);
            transition: background 0.3s, border-color 0.3s;
        }
        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn:hover {
            color: var(--text-primary);
        }
        .tab-btn.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
        }
        .tab-badge {
            background: #6366f1;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        /* ===== CONTENT ===== */
        .content {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ===== CARDS ===== */
        .card-grid {
            display: grid;
            gap: 16px;
        }
        .design-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
        }
        .design-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 20px var(--bg-card-hover-shadow);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
        }
        .card-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }
        .status-pending {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
        .status-in-progress {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .status-completed {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .status-cancelled {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .status-uploaded {
            background: rgba(168, 85, 247, 0.1);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        .status-sent-to-user {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .status-approved {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .status-rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .status-uploaded {
            background: rgba(168, 85, 247, 0.1);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        .approval-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        .approval-approved {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .approval-rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .approval-sent-to-user {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .approval-uploaded {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
        .feedback-box {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 8px;
            font-size: 13px;
        }
        .feedback-box strong {
            color: #f87171;
        }
        .card-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            margin-bottom: 14px;
            border: 1px solid var(--border-input);
            border-radius: 8px;
            overflow: hidden;
        }
        .detail-row {
            display: flex;
            flex-direction: column;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
        }
        .detail-row:nth-child(odd) {
            border-right: 1px solid var(--border-light);
        }
        .detail-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .detail-value {
            font-size: 14px;
            color: var(--text-detail);
            font-weight: 500;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-card-body);
        }
        .detail-item i {
            width: 16px;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* ===== REFERENCE FILES ===== */
        .reference-section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-light);
        }
        .reference-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .reference-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .ref-thumb {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border-card);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .ref-thumb:hover { transform: scale(1.05); }
        .ref-video-thumb {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-card);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
            font-size: 24px;
            cursor: pointer;
        }

        /* ===== AD TEXT ===== */
        .ad-text-box {
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-card-body);
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ===== UPLOAD SECTION ===== */
        .card-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transform: translateY(-1px);
        }
        .btn-success {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
        }
        .btn-success:hover {
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-secondary {
            background: var(--bg-btn-secondary);
            border: 1px solid var(--border-filter);
            color: var(--text-card-body);
        }
        .btn-secondary:hover {
            background: var(--bg-btn-secondary-hover);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== UPLOAD MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: var(--bg-modal);
            border: 1px solid var(--border-filter);
            border-radius: 20px;
            width: 90%;
            max-width: 540px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
            transition: background 0.3s;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }
        .modal-close {
            width: 36px; height: 36px;
            background: var(--bg-btn-secondary);
            border: none;
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: var(--bg-btn-secondary-hover); }

        .dropzone {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 14px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }
        .dropzone-icon {
            font-size: 36px;
            color: #6366f1;
            margin-bottom: 12px;
        }
        .dropzone-text {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .dropzone-subtext {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 4px;
        }
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 13px;
        }
        .file-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }
        .file-item-left i {
            color: #6366f1;
        }
        .file-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 260px;
        }
        .file-size {
            color: var(--text-muted);
            font-size: 11px;
        }
        .file-remove {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }
        .upload-notes {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            resize: vertical;
            min-height: 80px;
            outline: none;
            margin-bottom: 16px;
        }
        .upload-notes:focus {
            border-color: #6366f1;
        }
        .upload-notes::placeholder { color: var(--placeholder-color); }

        .progress-bar-container {
            display: none;
            margin-bottom: 16px;
        }
        .progress-bar-container.show { display: block; }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: var(--bg-input);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            text-align: center;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon {
            font-size: 48px;
            color: var(--empty-icon-color);
            margin-bottom: 16px;
        }
        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--empty-title-color);
            margin-bottom: 6px;
        }
        .empty-subtitle {
            font-size: 14px;
            color: var(--empty-subtitle-color);
        }

        /* ===== LOADING ===== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-muted);
            gap: 10px;
            font-size: 14px;
        }

        /* ===== IMAGE PREVIEW MODAL ===== */
        .preview-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-preview);
            z-index: 300;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .preview-overlay.show { display: flex; }
        .preview-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }
        .preview-overlay video {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 400;
            display: none;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
        }
        .toast.show { display: flex; }
        .toast-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }
        .toast-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ===== COMPLETED CARD EXTRAS ===== */
        .uploaded-files-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .uploaded-file-thumb {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border-card);
            cursor: pointer;
        }

        /* ===== COMPLETED WORK STATS & FILTERS ===== */
        .completed-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--bg-stat-card);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 14px 12px;
            text-align: center;
            transition: all 0.2s;
        }
        .stat-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }
        .stat-number {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.2;
        }
        .stat-number.total { color: #a5b4fc; }
        .stat-number.approved { color: #4ade80; }
        .stat-number.rejected { color: #f87171; }
        .stat-number.pending { color: #fbbf24; }
        .stat-number.uploaded { color: #38bdf8; }
        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-filter);
            background: var(--bg-filter-btn);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-btn:hover {
            border-color: rgba(99, 102, 241, 0.4);
            color: var(--text-primary);
        }
        .filter-btn.active {
            background: var(--bg-filter-active);
            border-color: #6366f1;
            color: #6366f1;
        }
        .filter-btn .filter-count {
            background: var(--bg-btn-secondary);
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .filter-btn.active .filter-count {
            background: rgba(99, 102, 241, 0.3);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .completed-stats { grid-template-columns: repeat(3, 1fr); }
            .filter-bar { gap: 6px; }
            .filter-btn { padding: 6px 12px; font-size: 12px; }
            .header { padding: 0 16px; }
            .content { padding: 16px; }
            .tabs-container { padding: 12px 16px 0; overflow-x: auto; }
            .tab-btn { padding: 10px 14px; font-size: 13px; white-space: nowrap; }
            .card-details { grid-template-columns: 1fr; }
            .detail-row:nth-child(odd) { border-right: none; }
            .modal { padding: 20px; width: 95%; }
            .user-badge { display: none; }
        }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo"><i class="fas fa-palette"></i></div>
            <span class="header-title">Designer Portal</span>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <div class="user-badge">
                <i class="fas fa-user-circle"></i>
                <span id="usernameDisplay">Designer</span>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <!-- ===== TABS ===== -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('received')" id="tab-received">
            <i class="fas fa-inbox"></i> Received Designs
            <span class="tab-badge" id="receivedCount">0</span>
        </button>
        <button class="tab-btn" onclick="switchTab('completed')" id="tab-completed">
            <i class="fas fa-check-circle"></i> Completed Work
            <span class="tab-badge" id="completedCount">0</span>
        </button>
    </div>

    <!-- ===== CONTENT ===== -->
    <div class="content">
        <!-- Received Designs Tab -->
        <div class="tab-content active" id="content-received">
            <div class="loading" id="receivedLoading">
                <i class="fas fa-spinner fa-spin"></i> Loading design requests...
            </div>
            <div class="card-grid" id="receivedList"></div>
        </div>

        <!-- Completed Work Tab -->
        <div class="tab-content" id="content-completed">
            <!-- Statistics -->
            <div class="completed-stats" id="completedStats">
                <div class="stat-card">
                    <div class="stat-number total" id="statTotal">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number approved" id="statApproved">0</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number rejected" id="statRejected">0</div>
                    <div class="stat-label">Rejected</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number pending" id="statPending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number uploaded" id="statUploaded">0</div>
                    <div class="stat-label">Uploaded</div>
                </div>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-bar" id="completedFilterBar">
                <button class="filter-btn active" onclick="filterCompleted('all')" id="filter-all">
                    <i class="fas fa-list"></i> All <span class="filter-count" id="filterCountAll">0</span>
                </button>
                <button class="filter-btn" onclick="filterCompleted('approved')" id="filter-approved">
                    <i class="fas fa-check-circle"></i> Approved <span class="filter-count" id="filterCountApproved">0</span>
                </button>
                <button class="filter-btn" onclick="filterCompleted('rejected')" id="filter-rejected">
                    <i class="fas fa-times-circle"></i> Rejected <span class="filter-count" id="filterCountRejected">0</span>
                </button>
                <button class="filter-btn" onclick="filterCompleted('sent-to-user')" id="filter-sent-to-user">
                    <i class="fas fa-paper-plane"></i> Pending <span class="filter-count" id="filterCountPending">0</span>
                </button>
                <button class="filter-btn" onclick="filterCompleted('uploaded')" id="filter-uploaded">
                    <i class="fas fa-cloud-upload-alt"></i> Uploaded <span class="filter-count" id="filterCountUploaded">0</span>
                </button>
            </div>

            <div class="loading" id="completedLoading">
                <i class="fas fa-spinner fa-spin"></i> Loading completed work...
            </div>
            <div class="card-grid" id="completedList"></div>
        </div>
    </div>

    <!-- ===== UPLOAD MODAL ===== -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-cloud-upload-alt" style="color:#6366f1"></i> Upload Design</h3>
                <button class="modal-close" onclick="closeUploadModal()"><i class="fas fa-times"></i></button>
            </div>

            <div id="uploadRequestInfo" style="margin-bottom: 16px; padding: 12px; background: rgba(99,102,241,0.08); border-radius: 10px; font-size: 13px; color: #a5b4fc;"></div>

            <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                <div class="dropzone-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="dropzone-text">Click or drag files here to upload</div>
                <div class="dropzone-subtext">Images, Videos, PDF, ZIP — Max 50MB per file</div>
            </div>
            <input type="file" id="fileInput" multiple hidden accept="image/*,video/*,.pdf,.zip,.ai,.psd,.svg">

            <div class="file-list" id="fileList"></div>

            <textarea class="upload-notes" id="uploadNotes" placeholder="Add notes about the design (optional)..."></textarea>

            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Uploading...</div>
            </div>

            <button class="btn btn-primary" style="width: 100%; justify-content: center;" id="uploadBtn" onclick="submitUpload()" disabled>
                <i class="fas fa-upload"></i> Upload Design
            </button>
        </div>
    </div>

    <!-- ===== IMAGE PREVIEW ===== -->
    <div class="preview-overlay" id="previewOverlay" onclick="this.classList.remove('show')">
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText"></span>
    </div>

    <script>
        // ============================================================
        // AUTH
        // ============================================================
        // ============================================================
        // THEME
        // ============================================================
        function getPreferredTheme() {
            const saved = localStorage.getItem('designerTheme');
            if (saved) return saved;
            return 'light';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.className = theme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            localStorage.setItem('designerTheme', theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        // Apply theme immediately
        applyTheme(getPreferredTheme());

        const API_BASE = CONFIG.getApiBaseUrl();
        let designerToken = localStorage.getItem('designerToken');
        let designerUser = null;

        try { designerUser = JSON.parse(localStorage.getItem('designerUser')); } catch(e) {}

        if (!designerToken) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('usernameDisplay').textContent = designerUser?.username || 'Designer';
            init();
        }

        function getHeaders() {
            return {
                'Authorization': `Bearer ${designerToken}`,
                'Content-Type': 'application/json'
            };
        }

        function logout() {
            localStorage.removeItem('designerToken');
            localStorage.removeItem('designerUser');
            window.location.href = 'login.html';
        }

        // ============================================================
        // TABS
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`content-${tab}`).classList.add('active');
        }

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            await Promise.all([loadReceivedDesigns(), loadCompletedWork()]);
        }

        // ============================================================
        // RECEIVED DESIGNS
        // ============================================================
        let receivedDesigns = [];

        async function loadReceivedDesigns() {
            const loading = document.getElementById('receivedLoading');
            const list = document.getElementById('receivedList');
            loading.style.display = 'flex';
            list.innerHTML = '';

            try {
                const res = await fetch(`${API_BASE}/api/designer/requests`, {
                    headers: { 'Authorization': `Bearer ${designerToken}` }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                const data = await res.json();
                receivedDesigns = data.designRequests || [];
                document.getElementById('receivedCount').textContent = receivedDesigns.length;

                loading.style.display = 'none';

                if (receivedDesigns.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><i class="fas fa-inbox"></i></div>
                            <div class="empty-title">No Design Requests</div>
                            <div class="empty-subtitle">No design requests have been assigned to you yet.</div>
                        </div>`;
                    return;
                }

                receivedDesigns.forEach(dr => {
                    list.innerHTML += renderDesignCard(dr);
                });

            } catch (err) {
                loading.style.display = 'none';
                list.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="empty-title">Failed to load</div><div class="empty-subtitle">${err.message}</div></div>`;
            }
        }

        function renderDesignCard(dr) {
            const statusClass = `status-${dr.status}`;
            const isCompleted = dr.status === 'completed';

            // Reference images
            let refImagesHtml = '';
            if (dr.referenceImagesS3 && dr.referenceImagesS3.length > 0) {
                refImagesHtml = dr.referenceImagesS3.map(img =>
                    `<img class="ref-thumb" src="${img.url}" alt="Reference" onclick="previewImage('${img.url}')" onerror="this.style.display='none'">`
                ).join('');
            }

            // Reference videos
            let refVideosHtml = '';
            if (dr.referenceVideosS3 && dr.referenceVideosS3.length > 0) {
                refVideosHtml = dr.referenceVideosS3.map(vid =>
                    `<div class="ref-video-thumb" onclick="previewVideo('${vid.url}')"><i class="fas fa-play"></i></div>`
                ).join('');
            }

            const hasReferences = refImagesHtml || refVideosHtml;

            return `
            <div class="design-card">
                <div class="card-header">
                    <div>
                        <div class="card-title">${escHtml(dr.businessName || 'Untitled')}</div>
                        <div class="card-subtitle">${escHtml(dr.uploaderName || '')} &bull; ${formatDate(dr.assignedAt || dr.createdAt)}</div>
                    </div>
                    <span class="status-badge ${statusClass}" style="text-transform:capitalize;">${dr.status}</span>
                </div>



                <div class="card-details">
                    <div class="detail-row">
                        <span class="detail-label">Uploader Name</span>
                        <span class="detail-value">${escHtml(dr.uploaderName || '-')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phone</span>
                        <span class="detail-value">${escHtml(dr.phoneNumber || '-')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Business Name</span>
                        <span class="detail-value">${escHtml(dr.businessName || '-')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email</span>
                        <span class="detail-value">${escHtml(dr.email || '-')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Business Phone</span>
                        <span class="detail-value">${escHtml(dr.businessPhone || dr.phoneNumber || '-')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Ad Type</span>
                        <span class="detail-value">${escHtml(dr.adType || '-')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Channel Type</span>
                        <span class="detail-value">${escHtml(dr.channelType || '-')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Created</span>
                        <span class="detail-value">${formatDate(dr.createdAt)}</span>
                    </div>
                    ${dr.businessAddress ? `
                    <div class="detail-row" style="grid-column: span 2;">
                        <span class="detail-label">Address</span>
                        <span class="detail-value">${escHtml(dr.businessAddress)}</span>
                    </div>` : ''}
                    ${dr.webLinks && dr.webLinks.length > 0 ? `
                    <div class="detail-row" style="grid-column: span 2;">
                        <span class="detail-label">Web Links</span>
                        <span class="detail-value">${dr.webLinks.map(l => `<a href="${escHtml(l)}" target="_blank" style="color:#a5b4fc; text-decoration:none;">${escHtml(l)}</a>`).join(', ')}</span>
                    </div>` : ''}
                </div>

                ${dr.adText ? `<div class="ad-text-box"><strong style="color:#94a3b8">Ad Text:</strong><br>${escHtml(dr.adText)}</div>` : ''}

                ${dr.adminNotes ? `<div class="ad-text-box" style="border-color: rgba(99,102,241,0.15);"><strong style="color:#a5b4fc">Admin Notes:</strong><br>${escHtml(dr.adminNotes)}</div>` : ''}

                ${hasReferences ? `
                    <div class="reference-section">
                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
                            <div class="reference-title" style="margin-bottom:0;"><i class="fas fa-photo-video" style="margin-right:6px"></i> Media Files:</div>
                            <button class="btn btn-secondary" style="font-size:12px; padding:6px 14px;" onclick="downloadRequestDetails('${dr._id}')">
                                <i class="fas fa-download"></i> Download All
                            </button>
                        </div>
                        <div class="reference-grid">
                            ${refImagesHtml}
                            ${refVideosHtml}
                        </div>
                    </div>
                ` : `
                    <div style="margin-top:14px;">
                        <button class="btn btn-secondary" style="font-size:12px; padding:6px 14px;" onclick="downloadRequestDetails('${dr._id}')">
                            <i class="fas fa-download"></i> Download Details
                        </button>
                    </div>
                `}

                ${dr.userApprovalStatus ? `
                    <div style="margin-top: 10px;">
                        ${dr.userApprovalStatus === 'approved' ? `
                            <div class="approval-badge approval-approved"><i class="fas fa-check-circle"></i> User Approved</div>
                        ` : dr.userApprovalStatus === 'rejected' ? `
                            <div class="approval-badge approval-rejected"><i class="fas fa-times-circle"></i> Changes Requested</div>
                        ` : dr.userApprovalStatus === 'sent-to-user' ? `
                            <div class="approval-badge approval-sent-to-user"><i class="fas fa-paper-plane"></i> Pending User Approval</div>
                        ` : dr.userApprovalStatus === 'uploaded' ? `
                            <div class="approval-badge approval-uploaded"><i class="fas fa-clock"></i> Awaiting Admin Review</div>
                        ` : ''}
                    </div>
                ` : ''}

                ${dr.userFeedback ? `
                    <div class="feedback-box">
                        <strong><i class="fas fa-comment-alt"></i> User Feedback:</strong><br>
                        ${escHtml(dr.userFeedback)}
                    </div>
                ` : ''}

                <div class="card-actions">
                    ${dr.userApprovalStatus === 'rejected' ? `
                        <button class="btn btn-primary" onclick="openUploadModal('${dr._id}', '${escHtml(dr.businessName || 'Design')}')">
                            <i class="fas fa-redo"></i> Re-upload Design
                        </button>
                    ` : !isCompleted ? `
                        <button class="btn btn-primary" onclick="openUploadModal('${dr._id}', '${escHtml(dr.businessName || 'Design')}')">
                            <i class="fas fa-upload"></i> Upload Design
                        </button>
                    ` : `
                        <span class="detail-item" style="color: #4ade80;"><i class="fas fa-check-circle"></i> Design Uploaded</span>
                    `}
                </div>
            </div>`;
        }

        // ============================================================
        // COMPLETED WORK
        // ============================================================
        let completedWork = [];
        let activeCompletedFilter = 'all';

        async function loadCompletedWork() {
            const loading = document.getElementById('completedLoading');
            const list = document.getElementById('completedList');
            loading.style.display = 'flex';
            list.innerHTML = '';

            try {
                const res = await fetch(`${API_BASE}/api/designer/completed`, {
                    headers: { 'Authorization': `Bearer ${designerToken}` }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                const data = await res.json();
                completedWork = data.uploads || [];
                document.getElementById('completedCount').textContent = completedWork.length;

                loading.style.display = 'none';

                updateCompletedStats();
                renderFilteredCompleted();

            } catch (err) {
                loading.style.display = 'none';
                list.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="empty-title">Failed to load</div><div class="empty-subtitle">${err.message}</div></div>`;
            }
        }

        function updateCompletedStats() {
            const total = completedWork.length;
            const approved = completedWork.filter(u => u.status === 'approved').length;
            const rejected = completedWork.filter(u => u.status === 'rejected').length;
            const pending = completedWork.filter(u => u.status === 'sent-to-user').length;
            const uploaded = completedWork.filter(u => u.status === 'uploaded').length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statApproved').textContent = approved;
            document.getElementById('statRejected').textContent = rejected;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statUploaded').textContent = uploaded;

            document.getElementById('filterCountAll').textContent = total;
            document.getElementById('filterCountApproved').textContent = approved;
            document.getElementById('filterCountRejected').textContent = rejected;
            document.getElementById('filterCountPending').textContent = pending;
            document.getElementById('filterCountUploaded').textContent = uploaded;
        }

        function filterCompleted(status) {
            activeCompletedFilter = status;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`filter-${status}`).classList.add('active');
            renderFilteredCompleted();
        }

        function renderFilteredCompleted() {
            const list = document.getElementById('completedList');
            list.innerHTML = '';

            let filtered = completedWork;
            if (activeCompletedFilter !== 'all') {
                filtered = completedWork.filter(u => u.status === activeCompletedFilter);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-folder-open"></i></div>
                        <div class="empty-title">${activeCompletedFilter === 'all' ? 'No Completed Work' : 'No ' + activeCompletedFilter.replace('sent-to-user', 'pending') + ' designs'}</div>
                        <div class="empty-subtitle">${activeCompletedFilter === 'all' ? 'Your completed designs will appear here.' : 'No designs with this status found.'}</div>
                    </div>`;
                return;
            }

            filtered.forEach(upload => {
                list.innerHTML += renderCompletedCard(upload);
            });
        }

        function renderCompletedCard(upload) {
            const dr = upload.designRequestId || {};
            const statusClass = `status-${upload.status}`;
            const statusLabel = upload.status === 'sent-to-user' ? 'Sent to User' : upload.status;

            let filesHtml = '';
            if (upload.filesS3 && upload.filesS3.length > 0) {
                filesHtml = upload.filesS3.map(f => {
                    if (f.contentType && f.contentType.startsWith('image/')) {
                        return `<img class="uploaded-file-thumb" src="${f.url}" alt="${escHtml(f.filename || '')}" onclick="previewImage('${f.url}')" onerror="this.style.display='none'">`;
                    } else if (f.contentType && f.contentType.startsWith('video/')) {
                        return `<div class="ref-video-thumb" style="width:70px;height:70px;" onclick="previewVideo('${f.url}')"><i class="fas fa-play"></i></div>`;
                    } else {
                        return `<a href="${f.url}" target="_blank" class="btn btn-secondary" style="font-size:11px; padding:6px 10px;"><i class="fas fa-file"></i> ${escHtml(f.filename || 'File')}</a>`;
                    }
                }).join('');
            }

            return `
            <div class="design-card">
                <div class="card-header">
                    <div>
                        <div class="card-title">${escHtml(dr.businessName || 'Design Upload')}</div>
                        <div class="card-subtitle">Uploaded ${formatDate(upload.createdAt)}</div>
                    </div>
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                </div>

                <div class="card-details">
                    ${dr.adType ? `<div class="detail-item"><i class="fas fa-image"></i> <span class="detail-label">Type:</span> ${dr.adType}</div>` : ''}
                    ${dr.uploaderName ? `<div class="detail-item"><i class="fas fa-user"></i> <span class="detail-label">Client:</span> ${escHtml(dr.uploaderName)}</div>` : ''}
                    <div class="detail-item"><i class="fas fa-file"></i> <span class="detail-label">Files:</span> ${upload.filesS3?.length || 0} file(s)</div>
                </div>

                ${upload.notes ? `<div class="ad-text-box"><strong style="color:#94a3b8">Your Notes:</strong><br>${escHtml(upload.notes)}</div>` : ''}
                ${upload.adminNotes ? `<div class="ad-text-box" style="border-color:rgba(99,102,241,0.15)"><strong style="color:#a5b4fc">Admin Notes:</strong><br>${escHtml(upload.adminNotes)}</div>` : ''}

                <div style="margin-top: 8px;">
                    ${upload.status === 'approved' ? `
                        <div class="approval-badge approval-approved"><i class="fas fa-check-circle"></i> User Approved</div>
                    ` : upload.status === 'rejected' ? `
                        <div class="approval-badge approval-rejected"><i class="fas fa-times-circle"></i> Changes Requested</div>
                    ` : upload.status === 'sent-to-user' ? `
                        <div class="approval-badge approval-sent-to-user"><i class="fas fa-paper-plane"></i> Pending User Approval</div>
                    ` : upload.status === 'uploaded' ? `
                        <div class="approval-badge approval-uploaded"><i class="fas fa-clock"></i> Awaiting Admin Review</div>
                    ` : ''}
                </div>

                ${upload.userFeedback ? `
                    <div class="feedback-box">
                        <strong><i class="fas fa-comment-alt"></i> User Feedback:</strong><br>
                        ${escHtml(upload.userFeedback)}
                    </div>
                ` : ''}

                ${filesHtml ? `
                    <div class="reference-section">
                        <div class="reference-title">Uploaded Files</div>
                        <div class="uploaded-files-grid">${filesHtml}</div>
                    </div>
                ` : ''}
            </div>`;
        }

        // ============================================================
        // UPLOAD MODAL
        // ============================================================
        // DOWNLOAD REQUEST DETAILS + IMAGES AS ZIP
        // ============================================================
        async function downloadRequestDetails(requestId) {
            // Find the request from loaded data
            const dr = receivedDesigns.find(r => r._id === requestId);
            if (!dr) {
                showToast('Request not found', 'error');
                return;
            }

            showToast('Preparing download...', 'info');

            try {
                const zip = new JSZip();
                const folderName = (dr.businessName || 'Design-Request').replace(/[^a-zA-Z0-9_-]/g, '_');

                // Build details text
                let details = '';
                details += `======================================\n`;
                details += `  DESIGN REQUEST DETAILS\n`;
                details += `======================================\n\n`;
                details += `Uploader Name:   ${dr.uploaderName || '-'}\n`;
                details += `Phone:           ${dr.phoneNumber || '-'}\n`;
                details += `Business Name:   ${dr.businessName || '-'}\n`;
                details += `Email:           ${dr.email || '-'}\n`;
                details += `Business Phone:  ${dr.businessPhone || dr.phoneNumber || '-'}\n`;
                details += `Ad Type:         ${dr.adType || '-'}\n`;
                details += `Channel Type:    ${dr.channelType || '-'}\n`;
                details += `Created:         ${formatDate(dr.createdAt)}\n`;
                details += `Status:          ${dr.status || '-'}\n`;
                if (dr.businessAddress) details += `Address:         ${dr.businessAddress}\n`;
                if (dr.webLinks && dr.webLinks.length > 0) details += `Web Links:       ${dr.webLinks.join(', ')}\n`;
                if (dr.adText) details += `\nAd Text:\n${dr.adText}\n`;
                if (dr.adminNotes) details += `\nAdmin Notes:\n${dr.adminNotes}\n`;

                // Download images and add to zip
                const imageFiles = (dr.referenceImagesS3 || []);
                const videoFiles = (dr.referenceVideosS3 || []);
                let imgCount = 0;
                let vidCount = 0;

                // Download images via backend proxy (bypasses CORS)
                for (let i = 0; i < imageFiles.length; i++) {
                    try {
                        const proxyUrl = `${API_BASE}/api/designer/proxy-download?url=${encodeURIComponent(imageFiles[i].url)}`;
                        const response = await fetch(proxyUrl);
                        if (response.ok) {
                            const blob = await response.blob();
                            const ext = getFileExtension(imageFiles[i].url, blob.type, 'jpg');
                            zip.file(`images/image_${i + 1}.${ext}`, blob);
                            imgCount++;
                        } else {
                            details += `\nImage ${i + 1} URL: ${imageFiles[i].url}`;
                        }
                    } catch (e) {
                        console.warn('Failed to download image:', imageFiles[i].url, e);
                        details += `\nImage ${i + 1} URL: ${imageFiles[i].url}`;
                    }
                }

                for (let i = 0; i < videoFiles.length; i++) {
                    try {
                        const proxyUrl = `${API_BASE}/api/designer/proxy-download?url=${encodeURIComponent(videoFiles[i].url)}`;
                        const response = await fetch(proxyUrl);
                        if (response.ok) {
                            const blob = await response.blob();
                            const ext = getFileExtension(videoFiles[i].url, blob.type, 'mp4');
                            zip.file(`videos/video_${i + 1}.${ext}`, blob);
                            vidCount++;
                        } else {
                            details += `\nVideo ${i + 1} URL: ${videoFiles[i].url}`;
                        }
                    } catch (e) {
                        console.warn('Failed to download video:', videoFiles[i].url, e);
                        details += `\nVideo ${i + 1} URL: ${videoFiles[i].url}`;
                    }
                }

                details += `\n\n======================================\n`;
                zip.file('details.txt', details);

                const content = await zip.generateAsync({ type: 'blob' });
                saveAs(content, `${folderName}.zip`);
                showToast(`Downloaded! ${imgCount} images, ${vidCount} videos`, 'success');
            } catch (err) {
                console.error('Download failed:', err);
                showToast('Download failed. Please try again.', 'error');
            }
        }

        function getFileExtension(url, mimeType, fallback) {
            // Try from URL
            const urlMatch = url.match(/\.([a-zA-Z0-9]+)(?:\?|$)/);
            if (urlMatch) return urlMatch[1].toLowerCase();
            // Try from MIME
            const mimeMap = { 'image/jpeg': 'jpg', 'image/png': 'png', 'image/webp': 'webp', 'image/gif': 'gif', 'video/mp4': 'mp4', 'video/webm': 'webm' };
            if (mimeType && mimeMap[mimeType]) return mimeMap[mimeType];
            return fallback;
        }

        // ============================================================
        // UPLOAD MODAL
        // ============================================================
        let currentRequestId = null;
        let selectedFiles = [];

        function openUploadModal(requestId, businessName) {
            currentRequestId = requestId;
            selectedFiles = [];
            document.getElementById('fileList').innerHTML = '';
            document.getElementById('uploadNotes').value = '';
            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('progressContainer').classList.remove('show');
            document.getElementById('uploadRequestInfo').innerHTML = `<i class="fas fa-info-circle"></i> Uploading design for: <strong>${businessName}</strong>`;
            document.getElementById('uploadModal').classList.add('show');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('show');
            currentRequestId = null;
            selectedFiles = [];
        }

        // Dropzone events
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            for (const file of files) {
                if (file.size > 50 * 1024 * 1024) {
                    showToast(`${file.name} is too large (max 50MB)`, 'error');
                    continue;
                }
                if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            }
            renderFileList();
            fileInput.value = '';
        }

        function renderFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = selectedFiles.map((f, i) => `
                <div class="file-item">
                    <div class="file-item-left">
                        <i class="fas ${getFileIcon(f.type)}"></i>
                        <span class="file-name">${escHtml(f.name)}</span>
                        <span class="file-size">${formatSize(f.size)}</span>
                    </div>
                    <button class="file-remove" onclick="removeFile(${i})"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
            document.getElementById('uploadBtn').disabled = selectedFiles.length === 0;
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        }

        async function submitUpload() {
            if (selectedFiles.length === 0 || !currentRequestId) return;

            const btn = document.getElementById('uploadBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            progressContainer.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = 'Preparing upload...';

            try {
                const formData = new FormData();
                selectedFiles.forEach(f => formData.append('files', f));
                formData.append('notes', document.getElementById('uploadNotes').value);

                // Use XMLHttpRequest for progress tracking
                const xhr = new XMLHttpRequest();
                
                const uploadPromise = new Promise((resolve, reject) => {
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const pct = Math.round((e.loaded / e.total) * 100);
                            progressFill.style.width = pct + '%';
                            progressText.textContent = `Uploading... ${pct}%`;
                        }
                    };

                    xhr.onload = () => {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            try { resolve(JSON.parse(xhr.responseText)); }
                            catch(e) { reject(new Error('Invalid response')); }
                        } else {
                            try {
                                const err = JSON.parse(xhr.responseText);
                                reject(new Error(err.message || 'Upload failed'));
                            } catch(e) {
                                reject(new Error('Upload failed'));
                            }
                        }
                    };

                    xhr.onerror = () => reject(new Error('Network error'));

                    xhr.open('POST', `${API_BASE}/api/designer/upload/${currentRequestId}`);
                    xhr.setRequestHeader('Authorization', `Bearer ${designerToken}`);
                    xhr.send(formData);
                });

                const data = await uploadPromise;

                progressFill.style.width = '100%';
                progressText.textContent = 'Upload complete!';

                showToast('Design uploaded successfully!', 'success');
                closeUploadModal();

                // Refresh both tabs
                await Promise.all([loadReceivedDesigns(), loadCompletedWork()]);

            } catch (err) {
                showToast(err.message || 'Upload failed', 'error');
                progressText.textContent = 'Upload failed';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-upload"></i> Upload Design';
            }
        }

        // ============================================================
        // PREVIEW
        // ============================================================
        function previewImage(url) {
            const overlay = document.getElementById('previewOverlay');
            overlay.innerHTML = `<img src="${url}" alt="Preview">`;
            overlay.classList.add('show');
        }

        function previewVideo(url) {
            const overlay = document.getElementById('previewOverlay');
            overlay.innerHTML = `<video src="${url}" controls autoplay style="max-width:90%;max-height:90%;border-radius:12px;"></video>`;
            overlay.classList.add('show');
        }

        // ============================================================
        // UTILS
        // ============================================================
        function escHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(d) {
            if (!d) return '';
            const date = new Date(d);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function getFileIcon(type) {
            if (!type) return 'fa-file';
            if (type.startsWith('image/')) return 'fa-file-image';
            if (type.startsWith('video/')) return 'fa-file-video';
            if (type === 'application/pdf') return 'fa-file-pdf';
            if (type === 'application/zip') return 'fa-file-archive';
            return 'fa-file';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toastText');
            toast.className = `toast toast-${type} show`;
            toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            text.textContent = message;
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
    </script>
</body>
